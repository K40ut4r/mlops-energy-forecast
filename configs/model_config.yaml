model:
  name: "xgboost"
  type: "regression"
  
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    
  lstm:
    units: 50
    dropout: 0.2
    epochs: 50
    batch_size: 32
    
  prophet:
    seasonality_mode: "multiplicative"
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: true

training:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  
features:
  target: "Global_active_power"
  lags: [1, 6, 24, 168]  # 1h, 6h, 24h, 7j
  rolling_windows: [6, 24, 168]
  
split:
  method: "time_based"  # Pas de shuffle pour time series
  train_end: "2009-12-31"
  test_start: "2010-01-01"