name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      train_full:
        description: 'Entraînement complet sur 2M+ lignes ?'
        required: true
        default: false
        type: boolean

jobs:
  # ─────────────────────────────────────────
  # 1. Lint & Format
  # ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          pip install black==24.1.0 flake8==7.0.0 isort==5.13.2

      - name: Check formatting with Black
        run: |
          black --check src/ tests/ streamlit_app/ \
            --extend-exclude "src/monitoring/"

      - name: Check imports with isort
        run: |
          isort --check-only src/ tests/ streamlit_app/ \
            --skip src/monitoring

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ streamlit_app/ \
            --max-line-length=127 \
            --extend-ignore=E203,W503 \
            --exclude=src/monitoring/

  # ─────────────────────────────────────────
  # 2. Tests rapides (sans entraînement complet)
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest==8.0.0 pytest-cov==4.1.0 httpx==0.26.0

      - name: Run API tests (mock)
        run: pytest tests/test_api.py -v

      - name: Run feature tests (échantillon)
        run: pytest tests/test_features.py -v

      - name: Run data tests
        run: pytest tests/test_data.py -v

      - name: Coverage report
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────
  # 3. Build Docker
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t energy-forecast-api:latest .

      - name: Test API container
        run: |
          docker run -d --name test-api -p 8000:8000 energy-forecast-api:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

  # ─────────────────────────────────────────
  # 4. Entraînement complet (UNIQUEMENT manuel)
  # ─────────────────────────────────────────
  train:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.train_full == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dataset
        uses: actions/cache@v3
        with:
          path: data/raw
          key: uci-dataset-${{ hashFiles('src/data/ingest.py') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow==2.10.0

      - name: Pipeline complet
        run: |
          python -m src.data.ingest
          python -m src.data.clean
          python -m src.features.build_features
          python -m src.models.train_model

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_id }}
          path: models/model.pkl